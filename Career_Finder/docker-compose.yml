name: career-finder

services:

  backend:
    image: career-finder-backend
    pull_policy: build
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: career-finder-backend
    networks:
      - app-network
    ports:
      - "8001:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DB_URL=/app/data/jobs.db
    volumes:
      # Share data folder so pipeline writes DB that backend reads
      - ./data:/app/data

  frontend:
    image: career-finder-frontend
    pull_policy: build
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: career-finder-frontend
    networks:
      - app-network
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://localhost:8001
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
